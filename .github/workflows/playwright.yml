name: Playwright Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Run daily at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  test:
    name: Run Playwright Tests (${{ matrix.project }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        project: [chromium, firefox, webkit]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.project }}

      - name: Create .env from secrets
        run: |
          echo "BASE_URL=${{ secrets.BASE_URL || 'https://www.saucedemo.com' }}" >> .env
          echo "STANDARD_USER=standard_user" >> .env
          echo "LOCKED_USER=locked_out_user" >> .env
          echo "PROBLEM_USER=problem_user" >> .env
          echo "PASSWORD=secret_sauce" >> .env
          echo "JSON_PLACEHOLDER_URL=https://jsonplaceholder.typicode.com" >> .env

      - name: Run Playwright tests
        run: npx playwright test --project=${{ matrix.project }}
        env:
          CI: true

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ matrix.project }}
          path: playwright-report/
          retention-days: 14

      - name: Upload traces on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces-${{ matrix.project }}
          path: test-results/
          retention-days: 7

  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium for API tests
        run: npx playwright install chromium --with-deps

      - name: Create .env
        run: |
          echo "BASE_URL=https://www.saucedemo.com" >> .env
          echo "JSON_PLACEHOLDER_URL=https://jsonplaceholder.typicode.com" >> .env

      - name: Run API tests only
        run: npx playwright test tests/api/ --project=chromium
        env:
          CI: true

      - name: Upload API test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-api
          path: playwright-report/
          retention-days: 7
